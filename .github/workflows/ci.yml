name: CI – Build & Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Frontend ──────────────────────────────────────────────────────────────
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # ── Backend ───────────────────────────────────────────────────────────────
      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Build backend (TypeScript)
        run: npm run build
        working-directory: backend

      # ── Smoke test – start server and verify health endpoint ──────────────────
      - name: Start backend server
        run: |
          cd backend
          NODE_ENV=test PORT=4000 node dist/app.js &
          echo "PID=$!" >> "$GITHUB_ENV"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:4000/api/health > /dev/null 2>&1; then
              echo "✅ Server is healthy"
              exit 0
            fi
            echo "⏳ Attempt $i/15 — waiting 2s..."
            sleep 2
          done
          echo "❌ Server failed to respond"
          exit 1

      - name: Verify API health response
        run: |
          RESPONSE=$(curl -sf http://127.0.0.1:4000/api/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' || (echo "❌ Unexpected health response" && exit 1)
          echo "✅ API health check passed"

      - name: Stop backend server
        if: always()
        run: |
          if [ -n "$PID" ]; then
            kill "$PID" 2>/dev/null || true
          fi

      # ── Upload frontend build as artifact for deploy ──────────────────────────
      - name: Upload frontend build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1
