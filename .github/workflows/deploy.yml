name: Deploy to AWS EC2

on:
  workflow_run:
    workflows: ["CI – Build & Smoke Test"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download frontend build from CI
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          SSH_OPTIONS: -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10

      # Verifica se o .env centralizado existe na EC2 antes de prosseguir
      - name: Verify env file on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            'test -f ${{ secrets.ENV_FILE_PATH }} || (echo "ERRO: .env nao encontrado em ${{ secrets.ENV_FILE_PATH }}" && exit 1)'

      # Sync frontend dist to EC2
      - name: Sync frontend dist to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new" \
            frontend/dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/heloisarossato.com/dist/

      # Deploy backend on EC2
      - name: Deploy backend on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/personal-website

            # Pull latest code
            git pull origin main

            # Garantir que o symlink do .env aponta para o arquivo centralizado
            ln -sf ${{ secrets.ENV_FILE_PATH }} backend/.env

            # Install ALL deps (need devDeps for tsc), build, then prune
            cd backend
            npm ci
            npm run build
            npm prune --omit=dev

            # Restart backend via systemd service (pw.service)
            sudo systemctl restart pw

            # Reload Caddy
            sudo caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
          ENDSSH